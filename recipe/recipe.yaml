context:
  version: "6.11.0"
  maj_min: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: qt6-wayland
  version: ${{ version }}

source:
  url: https://download.qt.io/official_releases/qt/${{ maj_min }}/${{ version }}/submodules/qtwayland-everywhere-src-${{ version }}.tar.xz
  md5: 89acbcde2e2351d19f4bcfc1e21e58d8

build:
  skip:
    - not linux

  # 2-stage build also needed
  # skip: ${{ build_platform != target_platform }}
  number: 1

requirements:
  build:
    - perl
    - cmake
    - ninja
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then:
        - qt6-main ${{ version }}.*
        - qt6-wayland ${{ version }}.*
        - wayland
        - libgl-devel
        - libegl-devel
        - libopengl-devel
        - libglx-devel
        - libvulkan-headers
        - libvulkan-loader
  host:
    - qt6-main ${{ version }}.*
    - wayland
    - libgl-devel
    - libegl-devel
    - libopengl-devel
    - libglx-devel
    - libvulkan-headers
    - libvulkan-loader
    - fontconfig
    - freetype
    - zlib
    - glib
    # The following X11 dependencies are only needed to build
    # the features
    #   XComposite EGL ......................... yes
    #   XComposite GLX ......................... yes
    # But these are being removed in qt 6, so it doesn't seem
    # worthwhile to build them for conda-forge in 2023
    # https://codereview.qt-project.org/c/qt/qtwayland/+/380604
    #
    # But.... they seem to get pulled in accidentally from qt-main
    # since qt-main is currently built with full X11 support
    # So for now, it doesn't really hurt to include them
    - libxkbcommon
    - xorg-libx11
    - xorg-libxext
    - xorg-libxrandr
    - xorg-libxcomposite
  run:
    # Ensure same version of qt6 is used
    - qt6-main ${{ version }}.*
    # Needs a run export?
    - xorg-libxcomposite
  run_exports:
    - ${{ pin_subpackage('qt6-wayland', upper_bound='x.x') }}

tests:
  - script:
      - if: unix
        then:
          - test -d $PREFIX/include/qt6/QtWaylandCompositor
          - test -f $PREFIX/lib/libQt6WaylandCompositor${SHLIB_EXT}

about:
  homepage: http://qt-project.org
  license: LGPL-3.0-only
  license_file:
    - LICENSES/BSD-3-Clause.txt
    - LICENSES/GFDL-1.3-no-invariants-only.txt
    - LICENSES/GPL-2.0-only.txt
    - LICENSES/GPL-3.0-only.txt
    - LICENSES/LGPL-3.0-only.txt
    - LICENSES/LicenseRef-Qt-Commercial.txt
    - LICENSES/Qt-GPL-exception-1.0.txt

  summary: QtWayland module
  description: |
    The QtWayland module consists of two parts.

    Wayland platform plugin --
        Enables Qt applications to be run as Wayland clients.

    QtWaylandCompositor API --
        Enables the creation of Wayland compositors using Qt and QtQuick.
  documentation: https://wiki.qt.io/QtWayland
  repository: https://github.com/qt/qtwayland/tree/5.15

extra:
  feedstock-name: qt-wayland
  recipe-maintainers:
    - hmaarrfk
    # qt-main added to help in case of any critical fixes or routine upgrades
    - conda-forge/qt-main
